<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Receituário - {{ cliente.nome }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        
        /* MÁGICA 1: Força o Google Chrome/Edge a imprimir as cores de fundo (o lilás do cabeçalho) */
        html {
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        body {
            margin: 0; 
            padding: 40px 0; /* Espaço para ficar elegante na tela do PC */
            font-family: 'Roboto', sans-serif;
            background-color: #e2e8f0; 
            display: flex; 
            justify-content: center; 
            /* MÁGICA 2: Fixa o conteúdo no topo, impedindo que o navegador empurre tudo para o meio */
            align-items: flex-start; 
            min-height: 100vh;
        }

        /* CONFIGURAÇÃO DA FOLHA A4 BRANCA */
        .a4-sheet {
            width: 210mm;
            min-height: 297mm;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* CABEÇALHO ONDULADO (Réplica do visual rosa/lilás) */
        .wavy-header {
            width: 100%;
            height: 130px;
            background-color: #c09eb0; 
            border-bottom-left-radius: 40% 25px;
            border-bottom-right-radius: 40% 15px;
            position: relative;
            margin-bottom: 20px;
            flex-shrink: 0; /* Impede que o cabeçalho encolha */
        }
        
        /* LOGOTIPO NO TOPO */
        .logo {
            position: absolute;
            left: 40px;
            top: 25px;
            height: 70px;
        }

        /* DATA E NOME DO CLIENTE */
        .doc-info {
            padding: 0 40px;
            font-size: 14px;
            color: #333;
            flex-shrink: 0;
        }
        .data-box {
            text-align: right;
            margin-bottom: 25px;
        }
        .cliente-box {
            display: flex;
            align-items: flex-end;
            margin-bottom: 40px;
        }
        .line-fill {
            flex-grow: 1;
            border-bottom: 1px solid #000;
            margin-left: 8px;
            padding-bottom: 2px;
            font-weight: 500;
            font-size: 16px;
        }

        /* CORPO DO TEXTO & MARCA D'ÁGUA */
        .content-area {
            flex-grow: 1;
            padding: 0 40px;
            position: relative;
            z-index: 10;
        }
        
        .watermark {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            opacity: 0.05; 
            z-index: -1;
        }

        .prescription-text {
            font-size: 15px;
            line-height: 1.8;
            color: #111;
            white-space: pre-wrap; /* Mantém as quebras de linha que você digitou no formulário */
        }

        /* RODAPÉ DINÂMICO */
        .footer-area {
            text-align: center;
            padding-bottom: 30px;
            flex-shrink: 0;
        }
        .footer-line {
            width: 60%;
            margin: 0 auto 10px auto;
            border-bottom: 1px solid #000;
        }
        .footer-text {
            font-size: 12px;
            color: #333;
            line-height: 1.4;
        }
        
        /* BOTÃO FLUTUANTE (Não aparece na impressão) */
        .print-btn {
            position: fixed; top: 20px; right: 20px;
            background: #c09eb0; color: white;
            border: none; padding: 12px 24px; border-radius: 6px;
            font-size: 16px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 999;
        }
        .print-btn:hover { background: #a88a9a; }

        /* MÁGICA 3: REGRAS RESTRITAS PARA A IMPRESSORA/PDF */
        @media print {
            @page { 
                margin: 0; 
                size: A4 portrait; 
            }
            body { 
                background: white; 
                margin: 0; 
                padding: 0; 
                display: block; /* Desliga o flexbox para a impressora não tentar centralizar nada */
            }
            .a4-sheet { 
                box-shadow: none; 
                border: none; 
                width: 100%; 
                height: 100%; 
                margin: 0;
                padding: 0;
                page-break-after: avoid; 
            }
            .print-btn { display: none !important; }
        }
    </style>
</head>
<body>

    <button class="print-btn" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>

    <div class="a4-sheet">
        
        <div class="wavy-header">
            <img src="{{ url_for('static', filename='img/LogoSmell.png') }}" class="logo" alt="Smell Clinic Logo">
        </div>

        <div class="doc-info">
            <div class="data-box">
                Data: {{ indicacao.data_registro[:10] | replace('-', '/') }}
            </div>
            <div class="cliente-box">
                <span>Cliente:</span>
                <div class="line-fill">{{ cliente.nome }}</div>
            </div>
        </div>

        <div class="content-area">
            <img src="{{ url_for('static', filename='img/LogoSmell.png') }}" class="watermark" alt="Marca d'agua">
            <div class="prescription-text">{{ indicacao.indicacoes_cliente }}</div>
        </div>

        <div class="footer-area">
            <div class="footer-line"></div>
            <div class="footer-text">
                <strong>{{ indicacao.profissional_nome }}</strong> - {{ indicacao.profissional_especialidade }}<br>
                (21) 2146 - 9161<br>
                @smell.terapiasnaturais<br>
                Rua Cachambi Nº 518 - Loja
            </div>
        </div>

    </div>
</body>
</html>
